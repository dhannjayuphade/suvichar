<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Village Game</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:8px;
z-index:10;
}

</style>
</head>

<body>

<div id="ui">
🎮 Real Village Explorer<br>
W A S D = Move<br>
Mouse = Look
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

camera.position.set(0,2,5)

let light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,10,5)
scene.add(light)

let ambient = new THREE.AmbientLight(0xaaaaaa)
scene.add(ambient)

let groundGeo = new THREE.PlaneGeometry(200,200)
let groundMat = new THREE.MeshStandardMaterial({color:0x228B22})
let ground = new THREE.Mesh(groundGeo,groundMat)

ground.rotation.x = -Math.PI/2
scene.add(ground)

function createHouse(x,z){

let base = new THREE.Mesh(
new THREE.BoxGeometry(3,2,3),
new THREE.MeshStandardMaterial({color:0xffcc99})
)

base.position.set(x,1,z)
scene.add(base)

let roof = new THREE.Mesh(
new THREE.ConeGeometry(2.5,2,4),
new THREE.MeshStandardMaterial({color:0xaa0000})
)

roof.position.set(x,3,z)
roof.rotation.y=Math.PI/4
scene.add(roof)

}

for(let i=0;i<10;i++){

createHouse(
Math.random()*80-40,
Math.random()*80-40
)

}

function createTree(x,z){

let trunk = new THREE.Mesh(
new THREE.CylinderGeometry(0.3,0.3,2),
new THREE.MeshStandardMaterial({color:0x8b4513})
)

trunk.position.set(x,1,z)
scene.add(trunk)

let leaves = new THREE.Mesh(
new THREE.SphereGeometry(1.5),
new THREE.MeshStandardMaterial({color:0x228b22})
)

leaves.position.set(x,3,z)
scene.add(leaves)

}

for(let i=0;i<30;i++){

createTree(
Math.random()*100-50,
Math.random()*100-50
)

}

let keys={}

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true
})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false
})

function animate(){

requestAnimationFrame(animate)

if(keys["w"]) camera.position.z -=0.2
if(keys["s"]) camera.position.z +=0.2
if(keys["a"]) camera.position.x -=0.2
if(keys["d"]) camera.position.x +=0.2

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
