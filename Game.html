<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Walking Explorer Game</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
}

#ui{
position:absolute;
top:10px;
left:10px;
background:white;
padding:8px;
border-radius:8px;
z-index:999;
}

</style>
</head>

<body>

<div id="ui">🚶 Walking Explorer Game</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([20,78],5)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

let player

navigator.geolocation.watchPosition(function(pos){

let lat = pos.coords.latitude
let lon = pos.coords.longitude

if(!player){

player = L.marker([lat,lon]).addTo(map)
.bindPopup("🚶 You")
.openPopup()

map.setView([lat,lon],17)

}else{

player.setLatLng([lat,lon])

}

})

</script>

</body>
</html>
