<!DOCTYPE html>
<html>
<head>
  <title>Milk / Quiz System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <style>
    body{
      font-family:Poppins;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
      text-align:center;
      padding:30px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:15px;
      max-width:400px;
      margin:auto;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    input{
      width:90%;
      padding:10px;
      margin:10px;
      border-radius:10px;
      border:none;
    }

    button{
      background:#22c55e;
      border:none;
      padding:10px 20px;
      border-radius:10px;
      color:white;
      cursor:pointer;
      margin:10px;
    }
  </style>

  <script>
    // 🔐 EmailJS init
    (function(){
      emailjs.init("YOUR_PUBLIC_KEY"); // 🔥 replace
    })();

    // 🚀 MAIN FUNCTION
    function submitData(){

      let name = document.getElementById("name").value;
      let score = document.getElementById("score").value;

      if(!name || !score){
        alert("Fill all fields ❌");
        return;
      }

      // 💾 save locally
      localStorage.setItem("user", name);

      // 📧 EMAIL SEND
      emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{
        name: name,
        score: score
      })
      .then(()=>{
        alert("Email Sent ✅");
      })
      .catch((err)=>{
        alert("Email Error ❌");
        console.log(err);
      });

      // 📲 WHATSAPP SEND
      let msg = `Name: ${name} Score: ${score}`;
      let url = "https://wa.me/91XXXXXXXXXX?text=" + encodeURIComponent(msg);
      window.open(url);

    }
  </script>
</head>

<body>

  <div class="card">
    <h2>Milk / Quiz System 🥛</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="number" id="score" placeholder="Enter Score">

    <button onclick="submitData()">Submit</button>
  </div>

</body>
  </html>
