<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mobile BlockCraft</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
}

#crosshair{
position:fixed;
top:50%;
left:50%;
width:8px;
height:8px;
background:white;
margin-left:-4px;
margin-top:-4px;
}

#controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:grid;
grid-template-columns:60px 60px 60px;
gap:10px;
}

button{
width:60px;
height:60px;
font-size:20px;
}

</style>
</head>

<body>

<div id="crosshair"></div>

<div id="controls">
<button onclick="move('up')">⬆</button>
<button onclick="move('left')">⬅</button>
<button onclick="move('right')">➡</button>
<button onclick="move('down')">⬇</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer=new THREE.WebGLRenderer()

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

scene.background=new THREE.Color(0x87CEEB)

let sun=new THREE.DirectionalLight(0xffffff,1)

sun.position.set(20,50,20)

scene.add(sun)

let geometry=new THREE.BoxGeometry(1,1,1)

let grass=new THREE.MeshLambertMaterial({color:0x4CAF50})
let dirt=new THREE.MeshLambertMaterial({color:0x8B4513})

let blocks=[]

function addBlock(x,y,z,mat){

let cube=new THREE.Mesh(geometry,mat)

cube.position.set(x,y,z)

scene.add(cube)

blocks.push(cube)

}

function generateWorld(){

for(let x=-20;x<20;x++){
for(let z=-20;z<20;z++){

let h=Math.floor(Math.random()*3+1)

for(let y=0;y<h;y++){

if(y==h-1){
addBlock(x,y,z,grass)
}else{
addBlock(x,y,z,dirt)
}

}

}

}

}

generateWorld()

camera.position.set(0,5,10)

function move(dir){

let speed=0.5

if(dir=="up") camera.position.z-=speed
if(dir=="down") camera.position.z+=speed
if(dir=="left") camera.position.x-=speed
if(dir=="right") camera.position.x+=speed

}

let raycaster=new THREE.Raycaster()

window.addEventListener("click",()=>{

raycaster.setFromCamera(new THREE.Vector2(0,0),camera)

let hit=raycaster.intersectObjects(blocks)

if(hit.length>0){

let p=hit[0].object.position

addBlock(p.x,p.y+1,p.z,dirt)

}

})

window.addEventListener("contextmenu",e=>{

e.preventDefault()

raycaster.setFromCamera(new THREE.Vector2(0,0),camera)

let hit=raycaster.intersectObjects(blocks)

if(hit.length>0){

let b=hit[0].object

scene.remove(b)

blocks.splice(blocks.indexOf(b),1)

}

})

let time=0

function dayNight(){

time+=0.002

let brightness=(Math.sin(time)+1)/2

sun.intensity=brightness+0.3

}

function rain(){

if(Math.random()<0.1){

let drop=new THREE.Mesh(
new THREE.BoxGeometry(0.05,0.5,0.05),
new THREE.MeshBasicMaterial({color:0x66aaff})
)

drop.position.set(
Math.random()*40-20,
10,
Math.random()*40-20
)

scene.add(drop)

}

}

function animate(){

requestAnimationFrame(animate)

dayNight()

rain()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
