<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Horror Mission Game</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#joystick{
position:absolute;
bottom:40px;
left:40px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,0.15);
}

#stick{
width:60px;
height:60px;
background:white;
border-radius:50%;
position:absolute;
left:30px;
top:30px;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:8px;
}

</style>
</head>

<body>

<div id="ui">
👻 Horror Mission<br>
Items: <span id="items">0</span>/3
</div>

<div id="joystick">
<div id="stick"></div>
</div>

<audio id="horrorSound" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_4c6cba5a5c.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene=new THREE.Scene()

scene.fog=new THREE.Fog(0x000000,10,120)

let camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer=new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

camera.position.set(0,2,5)

let flashlight=new THREE.PointLight(0xffffff,1,30)
flashlight.position.set(0,2,0)
scene.add(flashlight)

let ambient=new THREE.AmbientLight(0x222222)
scene.add(ambient)

let ground=new THREE.Mesh(
new THREE.PlaneGeometry(300,300),
new THREE.MeshStandardMaterial({color:0x001100})
)

ground.rotation.x=-Math.PI/2
scene.add(ground)

function createTree(x,z){

let trunk=new THREE.Mesh(
new THREE.CylinderGeometry(0.2,0.2,3),
new THREE.MeshStandardMaterial({color:0x552200})
)

trunk.position.set(x,1.5,z)
scene.add(trunk)

}

for(let i=0;i<70;i++){
createTree(Math.random()*200-100,Math.random()*200-100)
}

let house=new THREE.Mesh(
new THREE.BoxGeometry(8,5,8),
new THREE.MeshStandardMaterial({color:0x333333})
)

house.position.set(0,2.5,-50)
scene.add(house)

let items=[]
let collected=0

for(let i=0;i<3;i++){

let item=new THREE.Mesh(
new THREE.BoxGeometry(0.6,0.6,0.6),
new THREE.MeshStandardMaterial({color:0xffff00})
)

item.position.set(Math.random()*80-40,1,Math.random()*80-40)

scene.add(item)
items.push(item)

}

let monster=new THREE.Mesh(
new THREE.BoxGeometry(1,3,1),
new THREE.MeshStandardMaterial({color:0xffffff})
)

monster.position.set(0,1,-60)
scene.add(monster)

let moveX=0
let moveZ=0

function animate(){

requestAnimationFrame(animate)

camera.position.x+=moveX
camera.position.z+=moveZ

flashlight.position.copy(camera.position)

monster.position.lerp(camera.position,0.002)

if(monster.position.distanceTo(camera.position)<2){
alert("👻 Monster caught you!")
location.reload()
}

items.forEach(i=>{

if(i.visible && i.position.distanceTo(camera.position)<2){

i.visible=false
collected++

document.getElementById("items").innerText=collected

}

})

if(collected==3){

alert("🎉 Mission complete! You escaped!")
location.reload()

}

renderer.render(scene,camera)

}

animate()

document.getElementById("horrorSound").play()

let joystick=document.getElementById("joystick")
let stick=document.getElementById("stick")

joystick.addEventListener("touchmove",e=>{

let rect=joystick.getBoundingClientRect()

let x=e.touches[0].clientX-rect.left-60
let y=e.touches[0].clientY-rect.top-60

stick.style.left=(x+30)+"px"
stick.style.top=(y+30)+"px"

moveX=x*0.01
moveZ=y*0.01

})

joystick.addEventListener("touchend",()=>{

stick.style.left="30px"
stick.style.top="30px"

moveX=0
moveZ=0

})

let startX=0

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchmove",e=>{

let dx=e.touches[0].clientX-startX
camera.rotation.y-=dx*0.003
startX=e.touches[0].clientX

})

</script>

</body>
  </html>
